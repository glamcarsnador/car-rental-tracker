<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELITE CAR RENTAL MANAGER</title>
    <style>
        :root { 
            --primary: #2c3e50; 
            --orange: #e67e22; 
            --green: #2ecc71; 
            --red: #e74c3c; 
            --border-color: #333; 
        }

        body { font-family: 'Segoe UI', Bold, sans-serif; margin: 0; background: #eaeff2; color: #000; }

        /* HEADER & TOOLBAR */
        .header { 
            background: #fff; padding: 15px 25px; display: flex; align-items: center; 
            justify-content: space-between; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .btn { 
            border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; 
            font-weight: 800; transition: 0.2s; font-size: 16px; color: white; text-transform: uppercase;
        }
        .btn-undo { background: #7f8c8d; margin-right: 10px; }
        .btn-redo { background: #7f8c8d; }
        
        /* TABLE & GRID */
        .table-wrapper { padding: 20px; overflow-x: auto; }
        
        /* THE THICK SCROLLBAR */
        .table-wrapper::-webkit-scrollbar { height: 22px; } 
        .table-wrapper::-webkit-scrollbar-track { background: #ccc; border-radius: 10px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; border: 3px solid #ccc; }

        table { 
            border-collapse: collapse; background: white; min-width: 3200px; 
            border: 4px solid var(--border-color); 
        }
        
        th { 
            background: var(--primary); color: white; padding: 15px; 
            text-align: center; font-size: 17px; border: 2px solid #fff;
            text-transform: uppercase;
        }
        
        td { border: 2px solid var(--border-color); padding: 0; }
        
        /* INPUTS & TEXT */
        input { 
            border: none; padding: 15px 10px; width: 100%; box-sizing: border-box; 
            font-size: 19px; font-weight: 700; outline: none; background: transparent; color: #000;
        }
        
        /* Highlight Car & Mat */
        td:nth-child(1) input, td:nth-child(2) input { color: #000; font-weight: 900; background: #f9f9f9; }

        input:focus { background: #fffbe6; }
        input[readonly] { background: #e0e0e0; color: #444; }

        /* ORANGE ALERT */
        .row-orange { background-color: var(--orange) !important; }
        .row-orange input { color: white !important; }

        /* BUTTONS IN TABLE */
        .action-cell { display: flex; gap: 8px; padding: 10px; background: #f0f0f0; justify-content: center; }
        .btn-finish { background: var(--primary); width: 120px; }
        .btn-del { background: var(--red); font-size: 20px; }
        .btn-add { background: var(--green); width: 180px; }

        .add-row { background: #cfe2ff; border-top: 5px solid var(--primary); }
        .status-text { font-weight: 900; font-size: 18px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <button class="btn btn-undo" onclick="undo()">⬅ UNDO</button>
        <button class="btn btn-redo" onclick="redo()">REDO ➡</button>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
        <div id="sync-dot" style="width:15px; height:15px; border-radius:50%; background:#ccc;"></div>
        <span id="sync-text" class="status-text">CONNECTING...</span>
    </div>
</div>

<div class="table-wrapper">
    <table id="mainTable">
        <thead>
            <tr>
                <th>CAR</th><th>MATRICULE</th><th>CLIENT NAME</th><th>PHONE</th><th>ID CARD N°</th>
                <th>DATE OUT</th><th>TIME</th><th>DATE IN</th><th>DAYS</th><th>DAY PRICE</th>
                <th>TOTAL PRICE</th><th>ADVANCE</th><th>REMAINING</th><th>KM OUT</th><th>KM IN</th><th>PAID</th><th>ACTIONS</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot>
            <tr class="add-row">
                <td><button class="btn btn-add" onclick="addNewCar()">[+] ADD CAR</button></td>
                <td><input type="text" id="newCarName" placeholder="NAME"></td>
                <td><input type="text" id="newCarMat" placeholder="MATRICULE"></td>
                <td colspan="14" style="padding-left:20px; font-weight:bold;">ENTER NEW CAR DETAILS AND CLICK ADD</td>
            </tr>
        </tfoot>
    </table>
</div>

<script>
    // PASTE YOUR GOOGLE URL HERE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHgEJy767hBQ6iElpZQlc5A8h2RK_jOncMZ2eBxxnBUFetDOGQ6ZreJ1j5S9lxvXz3Yg/exec"; 

    let currentData = [];
    let stateHistory = [];
    let redoStack = [];

    async function init() {
        try {
            const res = await fetch(SCRIPT_URL);
            currentData = await res.json();
            renderTable();
            saveState();
            updateStatus("LIVE", "#2ecc71");
        } catch (e) { updateStatus("ERROR", "#e74c3c"); }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

        for (let i = 1; i < currentData.length; i++) {
            const row = currentData[i];
            const tr = document.createElement('tr');
            
            // ORANGE LOGIC (Date In index 7, Time index 6)
            const dateInRaw = row[7] ? formatToInputDate(row[7]) : "";
            const timeInRaw = row[6] || "00:00";
            if (dateInRaw === todayStr && currentTime > timeInRaw) tr.classList.add('row-orange');

            tr.innerHTML = `
                <td><input value="${row[0]||''}" onchange="updateCell(${i},0,this.value)"></td>
                <td><input value="${row[1]||''}" onchange="updateCell(${i},1,this.value)"></td>
                <td><input value="${row[2]||''}" onchange="updateCell(${i},2,this.value)"></td>
                <td><input value="${row[3]||''}" onchange="updateCell(${i},3,this.value)"></td>
                <td><input value="${row[4]||''}" onchange="updateCell(${i},4,this.value)"></td>
                <td><input type="date" value="${formatToInputDate(row[5])}" onchange="updateCell(${i},5,this.value)"></td>
                <td><input type="time" value="${row[6]||''}" onchange="updateCell(${i},6,this.value)"></td>
                <td><input type="date" value="${formatToInputDate(row[7])}" onchange="updateCell(${i},7,this.value)"></td>
                <td><input type="number" id="d-${i}" value="${row[8]||''}" onchange="runMath(${i})"></td>
                <td><input type="number" id="p-${i}" value="${row[9]||''}" onchange="runMath(${i})"></td>
                <td><input type="number" id="t-${i}" value="${row[10]||''}" onchange="runMath(${i})"></td>
                <td><input type="number" id="a-${i}" value="${row[11]||''}" onchange="runMath(${i})"></td>
                <td><input type="number" id="r-${i}" value="${row[12]||''}" readonly></td>
                <td><input type="number" value="${row[13]||''}" onchange="updateCell(${i},13,this.value)"></td>
                <td><input type="number" value="${row[14]||''}" onchange="updateCell(${i},14,this.value)"></td>
                <td><input type="text" value="${row[15]||''}" onchange="updateCell(${i},15,this.value)"></td>
                <td class="action-cell">
                    <button class="btn btn-del" onclick="deleteRow(${i})">🗑</button>
                    <button class="btn btn-finish" onclick="archiveRow(${i})">FINISH</button>
                </td>
            `;
            tbody.appendChild(tr);
        }
    }

    function formatToInputDate(v) {
        if(!v) return "";
        try { return new Date(v).toISOString().split('T')[0]; } catch(e) { return ""; }
    }

    function runMath(i) {
        const days = parseFloat(document.getElementById(`d-${i}`).value) || 0;
        const price = parseFloat(document.getElementById(`p-${i}`).value) || 0;
        const total = parseFloat(document.getElementById(`t-${i}`).value) || (days * price);
        const adv = parseFloat(document.getElementById(`a-${i}`).value) || 0;
        const rem = total - adv;
        
        document.getElementById(`t-${i}`).value = total;
        document.getElementById(`r-${i}`).value = rem;
        
        currentData[i][8] = days; currentData[i][9] = price;
        currentData[i][10] = total; currentData[i][11] = adv; currentData[i][12] = rem;
        sync();
    }

    function updateCell(r, c, v) { currentData[r][c] = v; sync(); }

    async function sync() {
        saveState();
        updateStatus("SAVING...", "#f39c12");
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "saveAll", data: currentData }) });
        updateStatus("LIVE", "#2ecc71");
    }

    function addNewCar() {
        const n = document.getElementById('newCarName').value;
        const m = document.getElementById('newCarMat').value;
        if(!n || !m) return alert("MISSING NAME/MATRICULE");
        let newRow = Array(16).fill("");
        newRow[0] = n; newRow[1] = m;
        currentData.push(newRow);
        renderTable();
        sync();
        document.getElementById('newCarName').value = ""; document.getElementById('newCarMat').value = "";
    }

    function deleteRow(i) { if(confirm("DELETE CAR?")) { currentData.splice(i,1); renderTable(); sync(); } }

    async function archiveRow(i) {
        if(!confirm("FINISH RENTAL?")) return;
        updateStatus("ARCHIVING...", "#f39c12");
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "archive", row: i, data: currentData[i] }) });
        location.reload();
    }

    function saveState() {
        stateHistory.push(JSON.stringify(currentData));
        if(stateHistory.length > 30) stateHistory.shift();
    }

    function undo() {
        if(stateHistory.length < 2) return;
        redoStack.push(stateHistory.pop());
        currentData = JSON.parse(stateHistory[stateHistory.length - 1]);
        renderTable();
        sync();
    }

    function updateStatus(t, c) {
        document.getElementById('sync-text').innerText = t;
        document.getElementById('sync-dot').style.backgroundColor = c;
    }

    init();
</script>
</body>
</html>
