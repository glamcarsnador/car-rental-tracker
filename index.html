<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Car Rental Manager</title>
<style>
        :root { 
            --primary: #2c3e50; 
            --orange: #e67e22; 
            --green: #2ecc71; 
            --red: #e74c3c; 
            --accent: #3498db; 
            --border-color: #444; /* Darker lines for clarity */
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #eaeff2; color: #000; }

        /* HEADER & TOOLBAR */
        .header { 
            background: #fff; padding: 15px 25px; display: flex; align-items: center; 
            justify-content: space-between; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .btn { 
            border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; 
            font-weight: bold; transition: 0.2s; font-size: 16px; color: white;
        }
        .btn-undo { background: #7f8c8d; }
        .btn-redo { background: #7f8c8d; }
        
        /* TABLE & GRID */
        .table-wrapper { padding: 20px; overflow-x: auto; }
        
        /* THE THICK SCROLLBAR */
        .table-wrapper::-webkit-scrollbar { height: 18px; } /* Thicker scrollbar */
        .table-wrapper::-webkit-scrollbar-track { background: #ddd; border-radius: 10px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; border: 3px solid #ddd; }

        table { 
            border-collapse: collapse; background: white; min-width: 2800px; 
            border: 3px solid var(--border-color); 
        }
        
        th { 
            background: var(--primary); color: white; padding: 15px; 
            text-align: center; font-size: 16px; border: 2px solid #fff;
            text-transform: uppercase;
        }
        
        td { 
            border: 2px solid var(--border-color); /* Clear column/row lines */
            padding: 0; 
        }
        
        /* INPUTS & TEXT */
        input { 
            border: none; padding: 15px 10px; width: 100%; box-sizing: border-box; 
            font-size: 18px; /* Bigger Font */
            font-weight: 500;
            outline: none; background: transparent; color: #000;
        }
        
        /* First two columns (Car & Mat) stand out */
        td:nth-child(1) input, td:nth-child(2) input {
            font-weight: 800; 
            color: var(--primary);
            font-size: 19px;
        }

        input:focus { background: #fffde7; }
        input[readonly] { background: #eee; color: #666; font-weight: bold; }

        /* ORANGE ALERT */
        .row-orange { background-color: var(--orange) !important; }
        .row-orange input { color: white !important; }
        .row-orange input::placeholder { color: #eee; }

        /* BUTTONS IN TABLE */
        .action-cell { display: flex; gap: 8px; padding: 5px; background: #f9f9f9; }
        .btn-finish { background: var(--primary); font-size: 14px; width: 100px; }
        .btn-del { background: var(--red); font-size: 18px; }
        .btn-add { background: var(--green); padding: 15px; width: 150px; }

        .add-row { background: #d1e7ff; border-top: 4px solid var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <div class="controls">
        <button class="btn btn-undo" onclick="undo()">⬅ Undo</button>
        <button class="btn btn-redo" onclick="redo()">Redo ➡</button>
    </div>
    <div class="status-container">
        <div id="sync-dot" class="dot"></div>
        <span id="sync-text">Connecting...</span>
    </div>
</div>

<div class="table-wrapper">
    <table id="mainTable">
        <thead>
            <tr>
                <th>CAR</th><th>MATRICULE</th><th>CLIENT NAME</th><th>PHONE</th><th>DATE OUT</th>
                <th>TIME</th><th>DATE IN</th><th>DAYS</th><th>DAY PRICE</th><th>TOTAL PRICE</th>
                <th>ADVANCE</th><th>REMAINING</th><th>KM OUT</th><th>KM IN</th><th>PAID</th><th>ACTIONS</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot>
            <tr class="add-row">
                <td><button class="btn btn-add" onclick="addNewCar()">[+] ADD NEW</button></td>
                <td><input type="text" id="newCarName" placeholder="Enter Car Name"></td>
                <td><input type="text" id="newCarMat" placeholder="Enter Matricule"></td>
                <td colspan="13">Type name & matricule then click [+] to expand fleet.</td>
            </tr>
        </tfoot>
    </table>
</div>

<script>
    // 1. UPDATE THIS URL WITH YOUR GOOGLE WEB APP URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyGljdwohl2HywpWlh42xcWUa3Myd93vdMqcgbgD1r0QVQMkAIG7x6cLnwaxAdvGiTmxw/exec"; 

    let currentData = [];
    let stateHistory = [];
    let redoStack = [];

    // Initialize Connection
    async function init() {
        try {
            const res = await fetch(SCRIPT_URL);
            currentData = await res.json();
            renderTable();
            saveStateLocal(); // Set first snapshot
            updateStatus("Live", "#2ecc71");
        } catch (e) { updateStatus("Connection Error", "#e74c3c"); }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

        // Loop starting from index 1 to ignore header row in Google Sheets
        for (let i = 1; i < currentData.length; i++) {
            const row = currentData[i];
            const tr = document.createElement('tr');
            
            // ORANGE LOGIC: If Date In is Today AND Current Time > Row Time
            const dateInRaw = row[6] ? formatToInputDate(row[6]) : "";
            const timeInRaw = row[5] || "00:00";
            if (dateInRaw === todayStr && currentTime > timeInRaw) tr.classList.add('row-orange');

            tr.innerHTML = `
                <td><input value="${row[0]||''}" onchange="updateValue(${i},0,this.value)"></td>
                <td><input value="${row[1]||''}" onchange="updateValue(${i},1,this.value)"></td>
                <td><input value="${row[2]||''}" onchange="updateValue(${i},2,this.value)"></td>
                <td><input value="${row[3]||''}" onchange="updateValue(${i},3,this.value)"></td>
                <td><input type="date" value="${formatToInputDate(row[4])}" onchange="updateValue(${i},4,this.value)"></td>
                <td><input type="time" value="${row[5]||''}" onchange="updateValue(${i},5,this.value)"></td>
                <td><input type="date" value="${formatToInputDate(row[6])}" onchange="updateValue(${i},6,this.value)"></td>
                <td><input type="number" id="days-${i}" value="${row[7]||''}" onchange="calculateRow(${i})"></td>
                <td><input type="number" id="price-${i}" value="${row[8]||''}" onchange="calculateRow(${i})"></td>
                <td><input type="number" id="total-${i}" value="${row[9]||''}" onchange="manualTotal(${i},this.value)"></td>
                <td><input type="number" id="adv-${i}" value="${row[10]||''}" onchange="calculateRow(${i})"></td>
                <td><input type="number" id="rem-${i}" value="${row[11]||''}" readonly></td>
                <td><input type="number" value="${row[12]||''}" onchange="updateValue(${i},12,this.value)"></td>
                <td><input type="number" value="${row[13]||''}" onchange="updateValue(${i},13,this.value)"></td>
                <td><input type="text" value="${row[14]||''}" onchange="updateValue(${i},14,this.value)"></td>
                <td class="action-cell">
                    <button class="btn btn-del" onclick="deleteRow(${i})" title="Delete Car">🗑</button>
                    <button class="btn btn-finish" onclick="archiveRow(${i})">FINISH</button>
                </td>
            `;
            tbody.appendChild(tr);
        }
    }

    // Helper to format Google Sheet dates for HTML input
    function formatToInputDate(val) {
        if (!val || val === "") return "";
        try {
            let d = new Date(val);
            return d.toISOString().split('T')[0];
        } catch(e) { return ""; }
    }

    // AUTO MATH LOGIC
    function calculateRow(i) {
        const days = parseFloat(document.getElementById(`days-${i}`).value) || 0;
        const price = parseFloat(document.getElementById(`price-${i}`).value) || 0;
        const adv = parseFloat(document.getElementById(`adv-${i}`).value) || 0;
        
        const total = days * price;
        const remaining = total - adv;
        
        document.getElementById(`total-${i}`).value = total;
        document.getElementById(`rem-${i}`).value = remaining;
        
        // Update local data
        currentData[i][7] = days; currentData[i][8] = price;
        currentData[i][9] = total; currentData[i][10] = adv; currentData[i][11] = remaining;
        syncToSheet();
    }

    function manualTotal(i, val) {
        const adv = parseFloat(document.getElementById(`adv-${i}`).value) || 0;
        const remaining = val - adv;
        document.getElementById(`rem-${i}`).value = remaining;
        currentData[i][9] = val; currentData[i][11] = remaining;
        syncToSheet();
    }

    function updateValue(r, c, val) {
        currentData[r][c] = val;
        syncToSheet();
    }

    // CORE SYNCING
    async function syncToSheet() {
        saveStateLocal();
        updateStatus("Saving...", "#f39c12");
        await fetch(SCRIPT_URL, { 
            method: "POST", 
            body: JSON.stringify({ action: "saveAll", data: currentData }) 
        });
        updateStatus("Live", "#2ecc71");
    }

    function addNewCar() {
        const name = document.getElementById('newCarName').value;
        const mat = document.getElementById('newCarMat').value;
        if (!name || !mat) return alert("Please fill Car Name and Matricule first.");
        
        if (confirm(`Add ${name} to your fleet?`)) {
            let newRow = Array(15).fill("");
            newRow[0] = name; newRow[1] = mat;
            currentData.push(newRow);
            renderTable();
            syncToSheet();
            document.getElementById('newCarName').value = "";
            document.getElementById('newCarMat').value = "";
        }
    }

    function deleteRow(i) {
        if (confirm("Permanently delete this car from active fleet?")) {
            currentData.splice(i, 1);
            renderTable();
            syncToSheet();
        }
    }

    async function archiveRow(i) {
        if (!confirm("Moving data to History. The car will remain but client info will clear. Proceed?")) return;
        updateStatus("Archiving...", "#f39c12");
        await fetch(SCRIPT_URL, { 
            method: "POST", 
            body: JSON.stringify({ action: "archive", row: i, data: currentData[i] }) 
        });
        location.reload(); // Refresh to show clean row
    }

    // UNDO/REDO LOGIC
    function saveStateLocal() {
        stateHistory.push(JSON.stringify(currentData));
        if (stateHistory.length > 30) stateHistory.shift();
        redoStack = []; 
    }

    function undo() {
        if (stateHistory.length < 2) return;
        redoStack.push(stateHistory.pop());
        currentData = JSON.parse(stateHistory[stateHistory.length - 1]);
        renderTable();
        syncToSheet();
    }

    function redo() {
        if (redoStack.length === 0) return;
        const state = redoStack.pop();
        stateHistory.push(state);
        currentData = JSON.parse(state);
        renderTable();
        syncToSheet();
    }

    function updateStatus(text, color) {
        document.getElementById('sync-text').innerText = text;
        document.getElementById('sync-dot').style.backgroundColor = color;
    }

    init();
</script>
</body>
</html>
